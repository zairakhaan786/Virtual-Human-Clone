services:
  - type: web
    name: virtual-human-clone-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        value: mongodb+srv://<user>:<password>@cluster.mongodb.net/virtual_human_clone
      - key: JWT_SECRET
        generateValue: true
